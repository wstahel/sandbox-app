<!DOCTYPE html>
<html>
<head>
  <title>WGR Deal Tracker</title>
</head>

<body style="font-family: Arial; padding: 40px;">

  <h1>WGR Deal Tracker</h1>

  <h3>Add Deal</h3>
  <input id="name" placeholder="Deal Name">
  <input id="city" placeholder="City">
  <input id="price" placeholder="Price">
  <select id="status">
  <option value="New" selected>New</option>
  <option value="Reviewing">Reviewing</option>
  <option value="Pass">Pass</option>
  <option value="Pursue">Pursue</option>
  <option value="LOI">LOI</option>
  <option value="Dead">Dead</option>
</select></select>
  <button onclick="addDeal()">Add</button>

  <h3 style="margin-top:30px;">Pipeline</h3>
  <table border="1" cellpadding="10" id="table">
    <tr>
      <th>Deal Name</th>
      <th>City</th>
      <th>Price</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </table>

<script>
let deals = JSON.parse(localStorage.getItem("deals")) || [];

function render() {
  const table = document.getElementById("table");

  table.innerHTML = `
    <tr>
      <th>Deal Name</th>
      <th>City</th>
      <th>Price</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  `;

  deals.forEach((d, index) => {
  table.innerHTML += `
    <tr>
      <td>${d.name}</td>
      <td>${d.city}</td>
      <td>${d.price}</td>
      <td>${d.status}</td>
      <td><button onclick="deleteDeal(${index})">Delete</button></td>
    </tr>
  `;
});
}

function addDeal() {
  const deal = {
    name: document.getElementById("name").value,
    city: document.getElementById("city").value,
    price: document.getElementById("price").value,
    status: document.getElementById("status").value
  };

  deals.push(deal);
  localStorage.setItem("deals", JSON.stringify(deals));

  render();

  document.getElementById("name").value = "";
  document.getElementById("city").value = "";
  document.getElementById("price").value = "";
  document.getElementById("status").value = "";
}

render();
</script>

</body>
</html>
